<link rel="stylesheet" href="style.css" />

<div class="container">

  <a href="index.html" class="btn-retour">← Retour</a>

  <header>
    <h1>⚡ FlashMPP</h1>
    <p>Générateur d'avis administratif rapide</p>
  </header>

  <div class="formulaire-visible">
    <h2>🏅 Avis de Promotion</h2>

    <!-- IDENTITÉ -->
    <div class="section">
      <h3>👤 Identité</h3>
      <div class="champ">
        <label>Grade actuel</label>
        <select id="grade">
          <option value="Sapeur">Sapeur</option>
          <option value="Caporal">Caporal</option>
          <option value="Caporal-Chef">Caporal-Chef</option>
          <option value="Sergent">Sergent</option>
          <option value="Sergent-Chef">Sergent-Chef</option>
          <option value="Adjudant">Adjudant</option>
          <option value="Adjudant-Chef">Adjudant-Chef</option>
          <option value="Lieutenant">Lieutenant</option>
          <option value="Capitaine">Capitaine</option>
          <option value="Commandant">Commandant</option>
          <option value="Lieutenant-Colonel">Lieutenant-Colonel</option>
        </select>
      </div>
      <div class="champ">
        <label>Pseudo du joueur</label>
        <input type="text" id="nom" placeholder="Pseudo" />
      </div>
      <div class="champ">
        <label>Ce joueur a-t-il un poste ?</label>
        <select id="aPoste" onchange="afficherPoste()">
          <option value="non">Non — Agent simple</option>
          <option value="oui">Oui — Il occupe un poste</option>
        </select>
      </div>

      <div id="blocPoste" class="formulaire-cache">
        <div class="champ">
          <label>Poste occupé</label>
          <select id="poste">
            <optgroup label="--- Caserne ---">
              <option value="responsable_materiel">Responsable Matériel</option>
              <option value="responsable_pharmacie">Responsable Pharmacie</option>
              <option value="responsable_habillement">Responsable Habillement</option>
              <option value="responsable_vehicule">Responsable Véhicules</option>
              <option value="chef_section">Chef de Section</option>
              <option value="responsable_formation_caserne">Responsable Formation Caserne</option>
              <option value="chef_centre_adjoint">Chef de Centre Adjoint</option>
              <option value="chef_centre">Chef de Centre</option>
            </optgroup>
            <optgroup label="--- Groupement ---">
              <option value="chef_groupement">Chef de Groupement</option>
              <option value="chef_groupement_adjoint">Chef de Groupement Adjoint</option>
              <option value="responsable_formation">Responsable Formation</option>
              <option value="responsable_formation_adjoint">Responsable Formation Adjoint</option>
              <option value="responsable_operations">Responsable Opérations-Prévisions</option>
              <option value="responsable_operations_adjoint">Responsable Opérations-Prévisions Adjoint</option>
              <option value="responsable_rh">Responsable des Ressources Humaines</option>
              <option value="responsable_rh_adjoint">Responsable RH Adjoint</option>
              <option value="responsable_technique">Responsable Technique</option>
              <option value="responsable_technique_adjoint">Responsable Technique Adjoint</option>
            </optgroup>
          </select>
        </div>
        <div class="champ">
          <label>Tenue du poste</label>
          <select id="tenue_poste">
            <option value="parfait">Parfaitement tenu et en autonomie</option>
            <option value="bien">Bien tenu</option>
            <option value="moyen">Tenu de manière passable</option>
            <option value="insuffisant">Insuffisamment tenu</option>
          </select>
        </div>
      </div>
    </div>

    <!-- STATISTIQUES -->
    <div class="section">
      <h3>📊 Statistiques</h3>
      <div class="champ">
        <label>PA — Points d'Action (%)</label>
        <input type="number" id="pa" min="0" max="100" value="100" />
      </div>
      <div class="champ">
        <label>CP — Condition Physique (%)</label>
        <input type="number" id="cp" min="0" max="100" value="100" />
      </div>
      <div class="champ">
        <label>Humeur (%)</label>
        <input type="number" id="humeur" min="0" max="100" value="100" />
      </div>
    </div>

    <!-- OBLIGATIONS -->
    <div class="section">
      <h3>📋 Obligations</h3>
      <div class="champ">
        <label>Présence</label>
        <select id="presence">
          <option value="quotidienne">Quotidienne</option>
          <option value="reguliere">Régulière</option>
          <option value="irreguliere">Irrégulière</option>
        </select>
      </div>
      <div class="champ">
        <label>Habillement / EPI</label>
        <select id="epi">
          <option value="complet">Complet, entretenu et renouvelé</option>
          <option value="incomplet">Incomplet ou mal entretenu</option>
        </select>
      </div>
      <div class="champ">
        <label>FMA</label>
        <select id="fma">
          <option value="ajour">À jour</option>
          <option value="noajour">Non à jour</option>
        </select>
      </div>
      <div class="champ">
        <label>Planning débloqué</label>
        <select id="planning">
          <option value="oui">Oui, dans les temps</option>
          <option value="non">Non / En retard</option>
        </select>
      </div>
    </div>

    <!-- AVIS -->
    <div class="section">
      <h3>⚖️ Décision</h3>
      <div class="champ">
        <label>Avis</label>
        <select id="avis">
          <option value="favorable">Favorable</option>
          <option value="defavorable">Défavorable</option>
        </select>
      </div>
    </div>

    <!-- SIGNATURE -->
    <div class="section">
      <h3>✍️ Signature</h3>
      <div class="champ">
        <label>Ton grade</label>
        <select id="sig_grade">
          <option value="Sergent-Chef">Sergent-Chef</option>
          <option value="Adjudant">Adjudant</option>
          <option value="Adjudant-Chef">Adjudant-Chef</option>
          <option value="Lieutenant">Lieutenant</option>
          <option value="Capitaine">Capitaine</option>
          <option value="Commandant">Commandant</option>
          <option value="Lieutenant-Colonel">Lieutenant-Colonel</option>
          <option value="Colonel">Colonel</option>
        </select>
      </div>
      <div class="champ">
        <label>Ton pseudo</label>
        <input type="text" id="sig_pseudo" placeholder="Ton pseudo" />
      </div>
      <div class="champ">
        <label>Ta fonction</label>
        <select id="sig_fonction">
          <option value="Chef de Section">Chef de Section</option>
          <option value="Chef de Centre Adjoint">Chef de Centre Adjoint</option>
          <option value="Chef de Centre">Chef de Centre</option>
          <option value="Responsable Ressources Humaines">Responsable Ressources Humaines</option>
          <option value="Responsable Ressources Humaines Adjoint">Responsable Ressources Humaines Adjoint</option>
          <option value="Chef de Groupement">Chef de Groupement</option>
          <option value="Chef de Groupement Adjoint">Chef de Groupement Adjoint</option>
        </select>
      </div>
      <div class="champ">
        <label>Caserne / Groupement</label>
        <select id="sig_caserne">
          <optgroup label="--- SDIS 13 — Bouches-du-Rhône ---">
            <option value="CIS Alpilles-Durance|13">CIS Alpilles-Durance</option>
            <option value="CIS Chateaurenard|13">CIS Chateaurenard</option>
            <option value="CIS Eyguières|13">CIS Eyguières</option>
            <option value="CIS Istres|13">CIS Istres</option>
            <option value="CIS Lambesc|13">CIS Lambesc</option>
            <option value="CIS Mallemort|13">CIS Mallemort</option>
            <option value="CIS Salon-de-Provence|13">CIS Salon-de-Provence</option>
            <option value="CIS Vallée des Baux|13">CIS Vallée des Baux</option>
            <option value="Groupement Centre|13">Groupement Centre</option>
            <option value="Groupement Nord|13">Groupement Nord</option>
          </optgroup>
          <optgroup label="--- SDIS 67 — Bas-Rhin ---">
            <option value="CIS Bischwiller|67">CIS Bischwiller</option>
            <option value="CIS Molsheim|67">CIS Molsheim</option>
            <option value="CIS Petersbach|67">CIS Petersbach</option>
            <option value="CIS Saverne|67">CIS Saverne</option>
            <option value="CIS Strasbourg Ouest|67">CIS Strasbourg Ouest</option>
            <option value="CIS Truchtersheim|67">CIS Truchtersheim</option>
            <option value="CIS Val de Moder|67">CIS Val de Moder</option>
            <option value="CIS Wasselonne|67">CIS Wasselonne</option>
            <option value="Groupement Nord|67">Groupement Nord</option>
            <option value="Groupement Sud|67">Groupement Sud</option>
          </optgroup>
        </select>
      </div>
    </div>

    <button onclick="genererPromotion()">📄 Générer l'avis</button>
    <button type="button" onclick="resetPromotion()" style="background-color:#30363d; margin-top:10px;">🔄 Réinitialiser</button>
  </div>

  <div id="resultat" class="formulaire-cache"></div>

  <p class="signature-auteur">made by Ripper</p>

</div>

<script src="script-promotion.js?v=1"></script>
